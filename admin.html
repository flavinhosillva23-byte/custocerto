<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cadastrar oferta</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script defer src="config.js"></script><script defer src="admin.js"></script></head><body><header><div class="container header-row"><a class="logo" href="index.html"><b>C</b><span><strong>Custo Certo</strong><small>Voltar ao site</small></span></a></div></header><main class="container section"><div class="section-head"><div><span>PAINEL SIMPLES</span><h2>Cadastrar oferta real</h2><p>Use o link exato do produto e, quando houver, o seu link de afiliado.</p></div></div><form id="offerForm" class="hero-box" style="display:grid;gap:12px;max-width:760px"><input name="name" required placeholder="Nome do produto"><input name="brand" placeholder="Marca"><select name="category" required></select><input name="store" required placeholder="Loja"><input name="price" required type="number" step="0.01" placeholder="Preço"><input name="old_price" type="number" step="0.01" placeholder="Preço anterior"><input name="image_url" placeholder="URL da imagem do produto"><input name="product_url" required placeholder="Link exato da página do produto"><input name="affiliate_url" placeholder="Link de afiliado exato"><input name="shipping_text" placeholder="Frete"><input name="installments" placeholder="Parcelamento"><button style="background:var(--p);color:#fff;border:0;border-radius:10px;padding:12px;font-weight:800">Salvar oferta</button><p id="status"></p></form></main></body></html>
